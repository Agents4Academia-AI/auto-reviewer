<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in — Paper Reviewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..500&family=JetBrains+Mono:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="container narrow login-wrap">
    <p class="eyebrow">Automated peer review</p>
    <h1>Paper Reviewer</h1>
    <p class="muted">Enter your name and the shared password to continue.</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form action="/login" method="post" class="card">
      <label>Name
        <input type="text" name="name" autofocus required>
      </label>
      <label>Password
        <input type="password" name="password" required>
      </label>
      <button type="submit">Log in</button>
    </form>
  </main>
</body>
</html>
